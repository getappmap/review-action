name: AppMap Behavioral Review
description: |
  Maintain a project's AppMap gold-trace baseline and review the runtime-behavior
  change between two revisions. The work is performed by an AI coding agent
  (Claude Code, headless) running the getappmap/skills `appmap-gold-traces` and
  `appmap-review` skills. Updated gold traces (and any labels/tests the agent adds)
  are committed and pushed to the PR branch; the review is posted as a PR comment
  and job summary.
branding:
  icon: eye
  color: purple

inputs:
  agent:
    description: |
      Which agent runtime executes the skills: `claude` (Claude Code, default) or
      `copilot` (GitHub Copilot CLI).
    default: claude
  anthropic-api-key:
    description: |
      API key used to authenticate the Claude Code agent. Required when `agent` is
      `claude`; ignored when `agent` is `copilot`.
    required: false
  copilot-token:
    description: |
      GitHub token with Copilot access, used when `agent` is `copilot`. The default
      workflow `GITHUB_TOKEN` cannot use Copilot, so supply a PAT (or Copilot-enabled
      token) via a secret. Falls back to `github-token` if unset.
    required: false
    default: ''
  copilot-model:
    description: Model override passed to the Copilot CLI (`--model`). Empty uses its default.
    default: ''
  github-token:
    description: |
      Token used to push gold-trace updates to the PR branch and to post the review
      comment. Needs `contents: write` and `pull-requests: write`. Defaults to the
      workflow token.
    default: ${{ github.token }}
  base-revision:
    description: |
      The baseline revision the review compares against. Defaults to the PR base ref
      (`GITHUB_BASE_REF`). A revision is any git ref (SHA, branch, tag).
    default: ${{ github.base_ref }}
  head-revision:
    description: |
      The head revision to review. Defaults to the commit that triggered the run
      (`GITHUB_SHA`). Note: the action first records + commits gold-trace updates on
      the head branch, so the review reads the freshly-blessed head traces.
    default: ${{ github.sha }}
  gold-traces-dir:
    description: Managed gold-traces directory, relative to `working-directory` (the engine's `--dir`).
    default: gold_traces
  working-directory:
    description: |
      Directory the agent and gold-traces engine run from. Set to a package root in a
      monorepo. Defaults to the repository root.
    default: '.'
  comment-tag:
    description: |
      Distinguishes this run's sticky PR comment when the action runs more than once
      per PR (e.g. a matrix). Each distinct tag gets its own comment, updated in place
      on re-runs; set it to a stable per-entry key such as the matrix entry name.
      Defaults to `working-directory`, so monorepo matrix runs get separate comments
      automatically. `.` (the `working-directory` default) means untagged.
    default: ''
  skills-repo:
    description: Git URL of the skills repository to install.
    default: https://github.com/getappmap/skills.git
  skills-ref:
    description: Branch, tag, or SHA of the skills repository to pin.
    default: main
  claude-model:
    description: |
      Primary model for Claude Code (`--model`). Empty uses the Claude Code default
      (Opus). Set it to run cheaper, e.g. `claude-sonnet-4-5` instead of Opus 4.8.
    default: ''
  claude-mini-model:
    description: |
      The small/fast ("mini") model Claude Code uses for lightweight background work,
      via `ANTHROPIC_SMALL_FAST_MODEL`. Empty uses the Claude Code default (Haiku).
    default: ''
  appmap-cli-version:
    description: |
      Version of the AppMap CLI to install from getappmap/appmap-js GitHub releases
      (e.g. `3.196.2`). Takes precedence over an `appmap` binary already on PATH.
      Empty uses the PATH binary if present, else installs the latest release.
    default: ''
  node-version:
    description: |
      Node.js version the action needs (the agent CLIs and the bundled usage script
      run on Node). If the workflow already provides `node` at this major version or
      newer it is used as-is; otherwise the action installs this version. Override
      if the default causes trouble on your setup.
    default: '22'
  commit-message:
    description: Commit subject used when pushing gold-trace (and related) updates. `[skip ci]` is appended automatically.
    default: 'chore(gold-traces): update behavioral baseline'

outputs:
  report-file:
    description: Path to the generated Markdown review report.
    value: ${{ steps.review.outputs.report-file }}
  gold-traces-updated:
    description: 'true if the agent produced committable changes that were pushed.'
    value: ${{ steps.commit.outputs.updated }}
  models:
    description: Comma-separated model ids the agent reported using.
    value: ${{ steps.usage.outputs.models }}
  cost-usd:
    description: Total cost in USD, as reported by Claude Code. Empty for the copilot agent.
    value: ${{ steps.usage.outputs.cost-usd }}
  premium-requests:
    description: Total premium requests, as reported by the Copilot CLI. Empty for the claude agent.
    value: ${{ steps.usage.outputs.premium-requests }}
  input-tokens:
    description: Total input tokens (including cache reads/writes) reported by the agent. Empty when not reported.
    value: ${{ steps.usage.outputs.input-tokens }}
  output-tokens:
    description: Total output tokens reported by the agent. Empty when not reported.
    value: ${{ steps.usage.outputs.output-tokens }}
  duration-ms:
    description: Total agent wall time in milliseconds, summed across the update and review runs.
    value: ${{ steps.usage.outputs.duration-ms }}

runs:
  using: composite
  steps:
    # ----------------------------------------------------------------------------
    # Loop guard: pushing to the PR branch re-triggers the workflow. Bail if HEAD
    # is already one of our own gold-trace commits. Belt-and-suspenders with the
    # `[skip ci]` marker appended to the commit subject.
    # ----------------------------------------------------------------------------
    - id: guard
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: ${{ github.action_path }}/scripts/guard.sh

    # ----------------------------------------------------------------------------
    # Toolchain. Node only if the workflow doesn't already provide a recent one;
    # the AppMap CLI as a prebuilt binary from GitHub releases; the agent CLI
    # from npm into a dedicated prefix. Installs are cached keyed on the
    # resolved versions, so a re-run restores in seconds and the keys
    # self-invalidate when a new version ships.
    # ----------------------------------------------------------------------------
    - id: node
      if: steps.guard.outputs.skip != 'true'
      shell: bash
      env:
        NODE_MIN: ${{ inputs.node-version }}
      run: ${{ github.action_path }}/scripts/detect-node.sh

    - name: Set up Node.js
      if: steps.guard.outputs.skip != 'true' && steps.node.outputs.need-node == 'true'
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}

    - id: versions
      if: steps.guard.outputs.skip != 'true'
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        APPMAP_CLI_VERSION: ${{ inputs.appmap-cli-version }}
        AGENT: ${{ inputs.agent }}
      run: ${{ github.action_path }}/scripts/resolve-versions.sh

    - name: Cache AppMap CLI
      if: steps.guard.outputs.skip != 'true' && steps.versions.outputs.appmap-preinstalled != 'true'
      uses: actions/cache@v4
      with:
        path: ${{ runner.temp }}/appmap-bin
        key: appmap-${{ steps.versions.outputs.appmap-version }}-${{ steps.versions.outputs.platform }}

    - name: Install AppMap CLI
      if: steps.guard.outputs.skip != 'true' && steps.versions.outputs.appmap-preinstalled != 'true'
      shell: bash
      env:
        APPMAP_URL: ${{ steps.versions.outputs.appmap-url }}
        DEST: ${{ runner.temp }}/appmap-bin
      run: ${{ github.action_path }}/scripts/install-appmap.sh

    - name: Cache agent runtime
      if: steps.guard.outputs.skip != 'true'
      uses: actions/cache@v4
      with:
        # The extra paths hold the Copilot CLI's self-downloaded platform
        # engine (Linux and macOS locations); harmless when absent.
        path: |
          ${{ runner.temp }}/agent-tools
          ~/.cache/copilot
          ~/Library/Caches/copilot
        key: agent-${{ inputs.agent }}-${{ steps.versions.outputs.agent-version }}-${{ steps.versions.outputs.platform }}-node${{ steps.node.outputs.node-major }}

    - name: Install agent runtime
      if: steps.guard.outputs.skip != 'true'
      shell: bash
      env:
        AGENT: ${{ inputs.agent }}
        AGENT_PACKAGE: ${{ steps.versions.outputs.agent-package }}
        AGENT_VERSION: ${{ steps.versions.outputs.agent-version }}
        PREFIX: ${{ runner.temp }}/agent-tools
      run: ${{ github.action_path }}/scripts/install-agent.sh

    - name: Install skills
      if: steps.guard.outputs.skip != 'true'
      shell: bash
      env:
        SKILLS_REPO: ${{ inputs.skills-repo }}
        SKILLS_REF: ${{ inputs.skills-ref }}
        AGENT: ${{ inputs.agent }}
      run: ${{ github.action_path }}/scripts/install-skills.sh

    - name: Update gold traces
      if: steps.guard.outputs.skip != 'true'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        AGENT: ${{ inputs.agent }}
        ANTHROPIC_API_KEY: ${{ inputs.anthropic-api-key }}
        COPILOT_TOKEN: ${{ inputs.copilot-token }}
        GITHUB_TOKEN: ${{ inputs.github-token }}
        GOLD_TRACES_DIR: ${{ inputs.gold-traces-dir }}
        CLAUDE_MODEL: ${{ inputs.claude-model }}
        CLAUDE_MINI_MODEL: ${{ inputs.claude-mini-model }}
        COPILOT_MODEL: ${{ inputs.copilot-model }}
        ACTION_PATH: ${{ github.action_path }}
        USAGE_DIR: ${{ runner.temp }}/appmap-usage
      run: ${{ github.action_path }}/scripts/run-agent.sh update

    # Commit everything the agent changed (baselines, config, added labels/tests)
    # and push to the head branch before the review reads it from git history.
    - name: Commit and push gold-trace updates
      id: commit
      if: steps.guard.outputs.skip != 'true'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        COMMIT_MESSAGE: ${{ inputs.commit-message }}
      run: ${{ github.action_path }}/scripts/commit-and-push.sh

    - name: Review behavioral change
      id: review
      if: steps.guard.outputs.skip != 'true'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        AGENT: ${{ inputs.agent }}
        ANTHROPIC_API_KEY: ${{ inputs.anthropic-api-key }}
        COPILOT_TOKEN: ${{ inputs.copilot-token }}
        GITHUB_TOKEN: ${{ inputs.github-token }}
        BASE_REVISION: ${{ inputs.base-revision }}
        HEAD_REVISION: ${{ inputs.head-revision }}
        CLAUDE_MODEL: ${{ inputs.claude-model }}
        CLAUDE_MINI_MODEL: ${{ inputs.claude-mini-model }}
        COPILOT_MODEL: ${{ inputs.copilot-model }}
        ACTION_PATH: ${{ github.action_path }}
        USAGE_DIR: ${{ runner.temp }}/appmap-usage
      run: ${{ github.action_path }}/scripts/run-agent.sh review

    # Aggregate what the agent reported about its own usage (models, tokens,
    # cost or premium requests) into step outputs and a report footer.
    - name: Report agent usage
      id: usage
      if: steps.guard.outputs.skip != 'true'
      shell: bash
      env:
        USAGE_DIR: ${{ runner.temp }}/appmap-usage
      run: node ${{ github.action_path }}/scripts/usage.mjs report

    - name: Publish review
      if: steps.guard.outputs.skip != 'true' && steps.review.outputs.report-file != ''
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        REPORT_FILE: ${{ steps.review.outputs.report-file }}
        COMMENT_TAG: ${{ inputs.comment-tag || inputs.working-directory }}
        USAGE_FOOTER: ${{ steps.usage.outputs.footer-file }}
      run: ${{ github.action_path }}/scripts/post-review.sh
