# Example consumer workflow. Copy into a project that uses this action.
# The critical part is setting up a RUNNABLE TEST ENVIRONMENT before the action:
# recording gold traces executes the project's tests under the AppMap recorder.
name: AppMap Behavioral Review
on:
  pull_request:

permissions:
  contents: write
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}

      # --- Replace this block with YOUR project's test setup. ---
      # Python example:
      # - uses: actions/setup-python@v5
      #   with: { python-version: '3.12' }
      # - run: pip install -e . && pip install appmap pytest
      #
      # Node example (the action itself installs Node 22 if the workflow
      # doesn't provide a recent one, so this is only for YOUR project):
      # - uses: actions/setup-node@v4
      #   with: { node-version: '22' }
      # - run: npm ci

      - uses: getappmap/review-action@v1
        with:
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}

